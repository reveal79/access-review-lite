name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install quality modules
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.6.1 -Repository PSGallery -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -MinimumVersion 1.23.0 -Repository PSGallery -Scope CurrentUser -Force
      - name: Analyze
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
          $issues | Format-Table -AutoSize
          if ($issues) { throw "PSScriptAnalyzer reported $($issues.Count) issue(s)." }
      - name: Test
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./tests -CI -PassThru
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) test(s) failed." }
      - name: Generate demo report
        shell: pwsh
        run: ./Invoke-AccessReviewLite.ps1 -Demo -OutputPath ./artifacts/access-review-lite-demo.html
      - name: Upload demo report
        uses: actions/upload-artifact@v4
        with:
          name: demo-report-${{ matrix.os }}
          path: artifacts/access-review-lite-demo.html
